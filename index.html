---
layout: default
---

  {% for post in site.posts %}
      <!-- START ARTICLE FEED -->
      <section class="articles">
        <div class="column is-8 is-offset-2">
          <!-- START ARTICLE -->
          <div class="card article">
            <div class="card-content">
              <div class="media">
                <div class="media-center">
                  <img src="/images/cli-brand.png" class="author-image">
                </div>
                <div class="media-content has-text-centered">

                  <p class="title article-title"><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title}}</a></p>
                  <p class="subtitle is-6 article-subtitle">
                    on February 24, 2018
                  </p>
                </div>
              </div>
              <div class="content article-body">
                {{ post.excerpt }}
              </div>
            </div>
          </div>
          <!-- END ARTICLE -->
      </div>
</section>
  {% endfor %}
