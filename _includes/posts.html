<hr>
<div class="columns">
  <div class="column is-10 is-offset-1-tablet">
  <ul>
    {% for post in site.posts %}
    <li class="post-line"><a href="{{ post.url }}">{{ post.title }}</a>
    <div class="is-uppercase is-size-7"><time datetime="{{ post.date }}">{{ post.date | date: "%b %d, %Y" }}</time> | Deutsch</div>
    </li>
    {% endfor %}
  </ul>
</div></div>
